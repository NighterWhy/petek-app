_format_version: "3.0"
services:
  # --- 1. AUTH OFİSİ ---
  - name: auth-service
    url: http://host.docker.internal:3000
    routes:
      - name: auth-public
        paths:
          - /auth/login
          - /auth/register
        strip_path: false

      - name: auth-protected
        paths:
          - /auth/send-edu-code
          - /auth/verify-edu-code
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp

      
      - name: auth-api-route
        paths:
          - /api/auth
        strip_path: false
                
  # --- 2. LISTINGS OFİSİ ---
  - name: listings-service
    url: http://host.docker.internal:3001
    routes:
      - name: listings-public
        paths:
          - /listings
        methods:
          - GET
        strip_path: false
        
      - name: listings-protected
        paths:
          - /listings/create
          - /listings/upload-images
          - /listings/.*/favorite
          - /listings/favorites
          - /listings/my-listings
          - /listings/(?!.*(?:create|upload-images|favorite|favorites|my-listings)).*
        methods:
          - POST
          - GET
          - DELETE
          - PATCH
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                
      - name: listings-api-route
        paths:
          - /api/listings
        strip_path: false

  # --- 3. CHAT OFİSİ ---
  - name: chat-service
    url: http://host.docker.internal:3002 # DİKKAT: .env dosyasındaki portla aynı olmalı
    routes:
      - name: chat-api-route
        paths:
          - /api/chat
        strip_path: false

  # --- 4. NOTIFICATIONS OFİSİ ---
  - name: notifications-service
    url: http://host.docker.internal:3003 # DİKKAT: .env dosyasındaki portla aynı olmalı
    routes:
      - name: notifications-api-route
        paths:
          - /api/notifications
        strip_path: false

# Kong'un JWT'leri kiminle doğrulayacağını (Consumer) ayarlıyoruz
consumers:
  - username: petek-frontend
    jwt_secrets:
      - key: "petek-frontend-key"
        secret: "petek_super_gizli_anahtar_2026" 
        algorithm: HS256
